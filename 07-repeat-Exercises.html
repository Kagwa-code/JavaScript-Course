<!DOCTYPE html>
<html>
  <head>
    <title>Repeating Lesson 7 Execises</title>
  </head>
  <body>
    <script>
      function greet(name) {
        if (!name) {
          console.log('Hi there!');
        } else {
          console.log(`Hello ${name}!`);
        }
      }

      greet('Mary');
      greet();
    </script>
  </body>
</html>
